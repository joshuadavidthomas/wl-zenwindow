name: lint

on:
  pull_request:
    paths:
      - .github/workflows/lint.yml
      - src/**
      - Cargo.toml
      - Cargo.lock
      - Justfile
  push:
    branches: [main]
    paths:
      - .github/workflows/lint.yml
      - src/**
      - Cargo.toml
      - Cargo.lock
      - Justfile
  workflow_call:

concurrency:
  group: lint-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  should-run:
    if: "${{ github.event_name != 'push' || !contains(github.event.head_commit.message, ':bookmark: release v') }}"
    runs-on: ubuntu-latest
    steps:
      - run: true

  rustfmt:
    runs-on: ubuntu-24.04
    needs: [should-run]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions-rust-lang/setup-rust-toolchain@1780873c7b576612439a134613cc4cc74ce5538c
        with:
          toolchain: nightly
          components: rustfmt
          cache: true

      - name: Run rustfmt
        run: cargo +nightly fmt --all -- --check

  clippy:
    runs-on: ubuntu-24.04
    needs: [should-run]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev

      - uses: actions-rust-lang/setup-rust-toolchain@1780873c7b576612439a134613cc4cc74ce5538c
        with:
          components: clippy
          cache: true

      - name: Run clippy
        run: cargo clippy --all-targets --benches -- -D warnings
